<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" fill="none">
  <defs>
    <radialGradient id="glow" cx="50%" cy="45%" r="50%">
      <stop offset="0%" stop-color="#B87EFF" stop-opacity="0.9"/>
      <stop offset="60%" stop-color="#7B5FFF" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#4F9EFF" stop-opacity="0.6"/>
    </radialGradient>
    <radialGradient id="bodyGlow" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#C9A8FF" stop-opacity="1"/>
      <stop offset="50%" stop-color="#9D6FFF" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#5B3FD4" stop-opacity="0.7"/>
    </radialGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Tentacles -->
  <path d="M11 26 Q8 31 7 36" stroke="#7B5FFF" stroke-width="1.8" stroke-linecap="round" opacity="0.7"/>
  <path d="M14 28 Q13 33 11 38" stroke="#9D6FFF" stroke-width="1.8" stroke-linecap="round" opacity="0.7"/>
  <path d="M18 29 Q18 34 17 39" stroke="#7B5FFF" stroke-width="1.8" stroke-linecap="round" opacity="0.8"/>
  <path d="M22 29 Q22 34 23 39" stroke="#9D6FFF" stroke-width="1.8" stroke-linecap="round" opacity="0.8"/>
  <path d="M26 28 Q27 33 29 38" stroke="#7B5FFF" stroke-width="1.8" stroke-linecap="round" opacity="0.7"/>
  <path d="M29 26 Q32 31 33 36" stroke="#9D6FFF" stroke-width="1.8" stroke-linecap="round" opacity="0.7"/>
  <!-- Body bell -->
  <ellipse cx="20" cy="18" rx="12" ry="11" fill="url(#bodyGlow)" filter="url(#blur)"/>
  <!-- Inner glow dome -->
  <ellipse cx="20" cy="16" rx="8" ry="6" fill="url(#glow)" opacity="0.6"/>
  <!-- Eyes -->
  <circle cx="16.5" cy="17" r="1.8" fill="#090912" opacity="0.8"/>
  <circle cx="23.5" cy="17" r="1.8" fill="#090912" opacity="0.8"/>
  <circle cx="16.8" cy="16.7" r="0.7" fill="#E8D5FF" opacity="0.9"/>
  <circle cx="23.8" cy="16.7" r="0.7" fill="#E8D5FF" opacity="0.9"/>
  <!-- Rim highlight -->
  <ellipse cx="20" cy="28.5" rx="12" ry="1.5" fill="#7B5FFF" opacity="0.25"/>
</svg>
