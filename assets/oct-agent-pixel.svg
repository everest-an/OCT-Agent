<svg width="1145" height="196" viewBox="0 0 1145 196" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="OCT AGENT pixel banner">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#090a12"/>
      <stop offset="100%" stop-color="#0d0f1c"/>
    </linearGradient>
    <linearGradient id="violet" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#efe4ff"/>
      <stop offset="45%" stop-color="#bb83ff"/>
      <stop offset="100%" stop-color="#7d3aed"/>
    </linearGradient>
    <filter id="pixelShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feOffset dx="3" dy="3"/>
      <feFlood flood-color="#1f0b41" flood-opacity="0.95"/>
      <feComposite operator="in" in2="SourceGraphic"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="scan" width="6" height="6" patternUnits="userSpaceOnUse">
      <rect x="0" y="0" width="6" height="3" fill="#ffffff" fill-opacity="0.03"/>
    </pattern>
  </defs>

  <rect x="0" y="0" width="1145" height="196" fill="url(#bg)"/>
  <rect x="0" y="0" width="1145" height="196" fill="url(#scan)"/>

    <text x="572.5" y="126"
        text-anchor="middle"
      fill="url(#violet)"
      font-family="'Courier New', monospace"
      font-size="92"
        font-weight="900"
      letter-spacing="4"
        style="text-transform: uppercase;"
        filter="url(#pixelShadow)">OCT AGENT</text>

    <text x="572.5" y="126"
      text-anchor="middle"
      fill="none"
      stroke="#2a104b"
      stroke-width="2.5"
      font-family="'Courier New', monospace"
      font-size="92"
      font-weight="900"
      letter-spacing="4"
      style="text-transform: uppercase;">OCT AGENT</text>
</svg>
