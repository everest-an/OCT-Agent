<svg width="2048" height="403" viewBox="0 0 2048 403" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="OCT AGENT pixel banner">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#030306"/>
      <stop offset="100%" stop-color="#05050a"/>
    </linearGradient>
    <linearGradient id="txtGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#b68cff"/>
      <stop offset="45%" stop-color="#9d72f0"/>
      <stop offset="100%" stop-color="#784ac9"/>
    </linearGradient>
    <filter id="softNoise" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" seed="9" result="n"/>
      <feColorMatrix in="n" type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.03"/>
      </feComponentTransfer>
    </filter>
  </defs>

  <rect width="2048" height="403" fill="url(#bgGrad)"/>

  <g aria-hidden="true" fill="none" stroke="#8a52d9" stroke-width="4" opacity="0.95">
    <text x="42" y="300" font-family="'Courier New', monospace" font-size="258" font-weight="900" letter-spacing="6">OCT AGENT</text>
    <text x="52" y="292" font-family="'Courier New', monospace" font-size="258" font-weight="900" letter-spacing="6">OCT AGENT</text>
    <text x="60" y="284" font-family="'Courier New', monospace" font-size="258" font-weight="900" letter-spacing="6">OCT AGENT</text>
  </g>

  <text x="34" y="284"
        fill="url(#txtGrad)"
        font-family="'Courier New', monospace"
        font-size="258"
        font-weight="900"
        letter-spacing="6">OCT AGENT</text>

  <rect width="2048" height="403" filter="url(#softNoise)"/>
</svg>
