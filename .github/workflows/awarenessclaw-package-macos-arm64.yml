name: AwarenessClaw Package macOS arm64

on:
  workflow_dispatch:
    inputs:
      git_ref:
        description: Git ref to package (branch, tag, or commit SHA)
        required: false
        default: main

concurrency:
  group: awarenessclaw-package-macos-arm64-${{ github.event.inputs.git_ref || github.ref }}
  cancel-in-progress: true

jobs:
  package-macos-arm64:
    runs-on: macos-14
    timeout-minutes: 45

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.git_ref || github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Ensure app-builder arm64 binary
        run: |
          if [ ! -f node_modules/app-builder-bin/mac/app-builder_arm64 ]; then
            echo "app-builder_arm64 missing, installing app-builder-bin..."
            npm install --no-audit --no-fund --no-save app-builder-bin@5.0.0
          fi
          ls -la node_modules/app-builder-bin/mac
          test -f node_modules/app-builder-bin/mac/app-builder_arm64

      - name: Build macOS package (arm64)
        working-directory: packages/desktop
        run: |
          npm run build
          npx electron-builder --mac --arm64 --publish never -c.beforeBuild=./scripts/skip-deps-before-build.cjs -c.buildDependenciesFromSource=false

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: awarenessclaw-macos-arm64-${{ github.run_number }}
          if-no-files-found: error
          path: |
            packages/desktop/release/*.dmg
            packages/desktop/release/*.zip
            packages/desktop/release/latest-mac.yml
            packages/desktop/release/*.blockmap
            packages/desktop/release/builder-*.yml