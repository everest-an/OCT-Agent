name: AwarenessClaw CI

on:
  push:
    branches:
      - main
    paths:
      - package.json
      - package-lock.json
      - packages/cli/**
      - packages/desktop/**
      - .github/workflows/awarenessclaw-ci.yml
  pull_request:
    branches:
      - main
    paths:
      - package.json
      - package-lock.json
      - packages/cli/**
      - packages/desktop/**
      - .github/workflows/awarenessclaw-ci.yml
  workflow_dispatch:

concurrency:
  group: awarenessclaw-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-build:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Build desktop
        run: npm run build:desktop

      - name: Build CLI smoke check
        run: npm run build:cli

  desktop-test-matrix:
    name: Desktop tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Run desktop tests
        working-directory: packages/desktop
        run: npm test
